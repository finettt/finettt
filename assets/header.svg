<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap');

    .name {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 48px;
      font-weight: 700;
      fill: #e6edf3;
    }

    .tagline {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 400;
      fill: #9198a1;
    }

    .link {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 400;
      fill: #6e7681;
    }

    .line {
      stroke: #30363d;
      stroke-width: 1;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="200" rx="6" fill="#0d1117"/>

  <!-- Name -->
  <text x="40" y="72" class="name">finettt</text>

  <!-- Tagline -->
  <text x="40" y="105" class="tagline">Python/Go developer building AI agents and DevOps tooling.</text>

  <!-- Separator -->
  <line x1="40" y1="130" x2="760" y2="130" class="line"/>

  <!-- Link -->
  <text x="40" y="160" class="link">github.com/finettt ↗</text>
</svg>
